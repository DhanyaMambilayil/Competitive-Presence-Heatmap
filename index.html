<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Kuwait Exchange Network — Heatmap</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a1a2e;color:#e8eaf0;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
#header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#12121e;border-bottom:1px solid #2a2d3e;flex-shrink:0;flex-wrap:wrap;gap:6px;z-index:1001;}
#header h1{font-size:13px;font-weight:600;letter-spacing:.4px;color:#e8eaf0;white-space:nowrap;}
#header h1 span{color:#4b5563;font-weight:400;margin-left:6px;font-size:11px;}
#controls{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.btn-group{display:flex;gap:3px;align-items:center;background:#1e2035;border:1px solid #2a2d3e;border-radius:7px;padding:3px 7px;}
.btn-group label{display:flex;align-items:center;gap:3px;font-size:11px;cursor:pointer;white-space:nowrap;color:#9ca3af;}
.btn-group label:hover{color:#e8eaf0;}
.chip{display:inline-block;padding:1px 7px;border-radius:3px;font-size:10px;font-weight:700;color:#fff;letter-spacing:.3px;}
.chip.bec{background:#3b9edd;}.chip.muzaini{background:#dc2626;}.chip.mulla{background:#16a34a;}.chip.ansari{background:#1e3a8a;}
.ctl-cnt{font-size:10px;color:#6b7280;margin-left:1px;}
.tog{display:flex;align-items:center;gap:3px;font-size:11px;cursor:pointer;color:#9ca3af;padding:3px 7px;background:#1e2035;border:1px solid #2a2d3e;border-radius:7px;}
.tog:hover{color:#e8eaf0;}
.hdr-btn{font-size:11px;cursor:pointer;color:#e8eaf0;padding:4px 10px;background:#1e3a5f;border:1px solid #2563eb;border-radius:7px;white-space:nowrap;font-family:inherit;}
.hdr-btn:hover{background:#1d4ed8;}
#bg-toggle{display:flex;background:#1e2035;border:1px solid #2a2d3e;border-radius:7px;overflow:hidden;}
.bgt-btn{padding:3px 11px;font-size:11px;cursor:pointer;border:none;background:transparent;color:#9ca3af;font-family:inherit;}
.bgt-btn.active{background:#2563eb;color:#fff;}
.bgt-btn:hover:not(.active){color:#e8eaf0;}

#map-wrap{flex:1;position:relative;overflow:hidden;}
#map{width:100%;height:100%;}
#gov-canvas{position:absolute;top:0;left:0;pointer-events:none;z-index:200;}
#heat-canvas{position:absolute;top:0;left:0;pointer-events:all;z-index:400;cursor:default;}

/* Zoom */
#zoom-btns{position:absolute;bottom:40px;left:10px;z-index:1000;display:flex;flex-direction:column;gap:4px;}
.zbtn{width:32px;height:32px;background:rgba(18,18,30,.92);border:1px solid #2a2d3e;border-radius:7px;color:#e8eaf0;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.zbtn:hover{background:#1e2035;border-color:#2563eb;}

/* Tooltip */
#htip{position:absolute;z-index:2000;pointer-events:none;display:none;background:rgba(8,10,18,.97);border:1px solid #2a2d3e;border-radius:10px;padding:11px 14px;width:210px;box-shadow:0 8px 32px rgba(0,0,0,.8);backdrop-filter:blur(10px);}
#htip .hb{height:3px;border-radius:2px;margin-bottom:8px;}
#htip .hc{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-bottom:3px;}
#htip .hn{font-size:13px;font-weight:600;color:#f1f5f9;line-height:1.3;margin-bottom:7px;}
#htip .ht{display:flex;gap:5px;flex-wrap:wrap;}
.tag{font-size:10px;padding:2px 7px;border-radius:4px;background:#1e2130;color:#9ca3af;}
.tag.br{background:#1e3a5f;color:#93c5fd;}
.tag.ki{background:#3b1e1e;color:#fca5a5;}
.tag.gv{background:#1a2e1a;color:#86efac;}

/* Gov panel */
#gov-panel{position:absolute;z-index:2000;display:none;background:rgba(8,10,18,.97);border:1px solid #2a2d3e;border-radius:12px;width:270px;box-shadow:0 12px 48px rgba(0,0,0,.85);backdrop-filter:blur(12px);overflow:hidden;}
.gph{padding:12px 15px 10px;border-bottom:1px solid #1e2130;}
.gpt{font-size:14px;font-weight:600;color:#f1f5f9;margin-bottom:2px;}
.gps{font-size:11px;color:#6b7280;}
.gpc{position:absolute;top:10px;right:12px;background:none;border:none;color:#6b7280;font-size:16px;cursor:pointer;}
.gpc:hover{color:#e8eaf0;}
.gpb{padding:10px 15px 14px;}
.gpr{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:.5px solid #1e2130;}
.gpr:last-child{border-bottom:none;}
.gpco{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:500;color:#e8eaf0;}
.gpd{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.gpbd{font-size:10px;padding:1px 7px;border-radius:4px;}
.gpbr{background:#1e3a5f;color:#93c5fd;}
.gpki{background:#3b1e1e;color:#fca5a5;}
.gpz{color:#374151;font-size:11px;}
.gpbar{margin-top:10px;padding-top:8px;border-top:1px solid #1e2130;}
.gpbl{font-size:10px;color:#6b7280;margin-bottom:5px;}
.gpbr2{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.gpbn{font-size:10px;color:#9ca3af;width:62px;flex-shrink:0;}
.gpbt{flex:1;height:5px;background:#1e2130;border-radius:3px;overflow:hidden;}
.gpbf{height:100%;border-radius:3px;}
.gpbv{font-size:10px;color:#6b7280;width:22px;text-align:right;}

/* Summary */
#sumbox{position:absolute;top:10px;left:10px;z-index:1000;background:rgba(8,10,18,.93);border:1px solid #2a2d3e;border-radius:9px;padding:10px 13px;font-size:11px;backdrop-filter:blur(6px);min-width:150px;}
#sumbox .st{font-weight:600;color:#e8eaf0;font-size:13px;margin-bottom:6px;}
.sr{display:flex;justify-content:space-between;gap:10px;margin-bottom:2px;}
.sl{color:#9ca3af;}.sv{color:#e8eaf0;font-weight:500;}
#lu{font-size:9px;color:#4b5563;margin-top:6px;border-top:1px solid #1e2130;padding-top:5px;}

/* Legend */
#legend{position:absolute;bottom:30px;right:10px;z-index:1000;background:rgba(8,10,18,.93);border:1px solid #2a2d3e;border-radius:9px;padding:10px 13px;font-size:11px;backdrop-filter:blur(6px);}
#legend .lt{font-weight:600;color:#e8eaf0;margin-bottom:7px;font-size:12px;}
.lr{display:flex;align-items:center;gap:7px;margin-bottom:4px;font-size:11px;color:#9ca3af;}

/* Popup */
.leaflet-popup-content-wrapper{background:rgba(8,10,18,.97)!important;border:1px solid #2a2d3e!important;border-radius:10px!important;color:#e8eaf0!important;box-shadow:0 8px 32px rgba(0,0,0,.7)!important;}
.leaflet-popup-content{margin:12px 15px!important;font-size:12px!important;line-height:1.6!important;}
.leaflet-popup-tip{background:rgba(8,10,18,.97)!important;}
.leaflet-popup-close-button{color:#9ca3af!important;font-size:16px!important;}

/* Loading */
#loading{position:absolute;inset:0;background:rgba(8,10,18,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:3000;gap:14px;}
#loading p{color:#9ca3af;font-size:13px;}
.spinner{width:32px;height:32px;border:3px solid #1e2130;border-top:3px solid #2563eb;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.gov-name-label{background:transparent!important;border:none!important;box-shadow:none!important;}
</style>
</head>
<body>
<div id="header">
  <h1>Kuwait Exchange Network <span>🏛 branch &nbsp;🏧 kiosk</span></h1>
  <div id="controls">
    <div class="btn-group">
      <label><input type="checkbox" id="cb-bec" checked onchange="render()"><span class="chip bec">BEC</span><span class="ctl-cnt" id="cnt-bec"></span></label>
      <label><input type="checkbox" id="cb-muzaini" checked onchange="render()"><span class="chip muzaini">Muzaini</span><span class="ctl-cnt" id="cnt-muzaini"></span></label>
      <label><input type="checkbox" id="cb-mulla" checked onchange="render()"><span class="chip mulla">Al Mulla</span><span class="ctl-cnt" id="cnt-mulla"></span></label>
      <label><input type="checkbox" id="cb-ansari" checked onchange="render()"><span class="chip ansari">Al Ansari</span><span class="ctl-cnt" id="cnt-ansari"></span></label>
    </div>
    <div class="btn-group">
      <label><input type="checkbox" id="cb-branch" checked onchange="render()">Branches</label>
      <label><input type="checkbox" id="cb-kiosk" checked onchange="render()">Kiosks</label>
    </div>
    <label class="tog"><input type="checkbox" id="cb-heat" onchange="render()">Heatmap</label>
    <label class="tog"><input type="checkbox" id="cb-comp" onchange="render()">Competitive</label>
    <div id="bg-toggle">
      <button class="bgt-btn active" id="btn-map" onclick="setBg('map')">🗺 Map View</button>
      <button class="bgt-btn" id="btn-gov" onclick="setBg('gov')">🏛 Governorate View</button>
    </div>
    <button class="hdr-btn" onclick="loadData(true)">↻ Refresh</button>
  </div>
</div>

<div id="map-wrap">
  <div id="map"></div>
  <canvas id="gov-canvas"></canvas>
  <canvas id="heat-canvas"></canvas>

  <div id="zoom-btns">
    <button class="zbtn" onclick="map.zoomIn()">+</button>
    <button class="zbtn" onclick="map.zoomOut()">−</button>
    <button class="zbtn" style="font-size:13px" onclick="map.setView([29.20,47.98],9)">⌂</button>
  </div>

  <div id="htip">
    <div class="hb" id="hb"></div>
    <div class="hc" id="hc"></div>
    <div class="hn" id="hn"></div>
    <div class="ht" id="ht"></div>
  </div>

  <div id="gov-panel">
    <div class="gph">
      <div class="gpt" id="gpt"></div>
      <div class="gps" id="gps"></div>
      <button class="gpc" onclick="closeGovPanel()">✕</button>
    </div>
    <div class="gpb" id="gpb"></div>
  </div>

  <div id="sumbox">
    <div class="st">📍 <span id="s-total">0</span> locations</div>
    <div id="s-rows"></div>
    <div id="lu"></div>
  </div>

  <div id="legend">
    <div class="lt">Legend</div>
    <div style="margin-bottom:7px;padding-bottom:7px;border-bottom:.5px solid #1e2130;">
      <div style="font-size:10px;font-weight:600;color:#9ca3af;margin-bottom:5px;">Icon types</div>
      <div class="lr"><svg width="14" height="18" viewBox="0 0 14 18"><path d="M7 0C4.24 0 2 2.24 2 5c0 3.75 5 11 5 11s5-7.25 5-11c0-2.76-2.24-5-5-5z" fill="#3b9edd"/><rect x="4.5" y="2.5" width="5" height="4" fill="white" rx="0.3"/><polygon points="3.8,2.5 7,0.5 10.2,2.5" fill="white"/><rect x="5.8" y="3.2" width="0.8" height="2.5" fill="#3b9edd"/><rect x="7.4" y="3.2" width="0.8" height="2.5" fill="#3b9edd"/></svg> Branch (pin)</div>
      <div class="lr"><svg width="16" height="16" viewBox="0 0 16 16"><rect x="1" y="1" width="14" height="14" rx="2" fill="#3b9edd"/><rect x="3" y="3" width="10" height="6" fill="white" rx="0.5"/><rect x="4" y="3.5" width="8" height="4.5" fill="#3b9edd" rx="0.3"/><circle cx="4.5" cy="11" r="1" fill="white"/><circle cx="8" cy="11" r="1" fill="white"/><circle cx="11.5" cy="11" r="1" fill="white"/></svg> Kiosk (square)</div>
    </div>
    <div style="margin-bottom:7px;padding-bottom:7px;border-bottom:.5px solid #1e2130;">
      <div style="font-size:10px;font-weight:600;color:#9ca3af;margin-bottom:5px;">Heatmap density</div>
      <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;"><div style="width:80px;height:7px;border-radius:3px;background:linear-gradient(to right,#00a03c,#c8c800,#dc6000,#dc1c1c)"></div><span style="font-size:9px;color:#6b7280">low → high</span></div>
      <div class="lr"><span style="width:9px;height:9px;background:#00a03c;display:inline-block;border-radius:50%;flex-shrink:0"></span> Sparse / isolated</div>
      <div class="lr"><span style="width:9px;height:9px;background:#c8c800;display:inline-block;border-radius:50%;flex-shrink:0"></span> Moderate cluster</div>
      <div class="lr"><span style="width:9px;height:9px;background:#dc1c1c;display:inline-block;border-radius:50%;flex-shrink:0"></span> Dense cluster</div>
    </div>
    <div>
      <div style="font-size:10px;font-weight:600;color:#9ca3af;margin-bottom:5px;">Competitive view</div>
      <div class="lr"><span style="width:11px;height:11px;background:#22c55e;display:inline-block;border-radius:50%;flex-shrink:0"></span> We're stronger</div>
      <div class="lr"><span style="width:11px;height:11px;background:#ea6424;display:inline-block;border-radius:50%;flex-shrink:0"></span> Competitors stronger</div>
      <div class="lr"><span style="width:11px;height:11px;background:#ef4444;display:inline-block;border-radius:50%;flex-shrink:0"></span> Not present</div>
    </div>
  </div>

  <div id="loading"><div class="spinner"></div><p id="lmsg">Loading from Google Sheet…</p></div>
</div>

<script>
const SHEET_CSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vR0DcCB5P3DupJTwxRgcvCPX8RxirRRCV6I8y_oqJpQd-IvsVdVsY52o2csxhwDe8N29nP35gvLmz6-/pub?gid=0&single=true&output=csv';
const COLORS={bec:'#3b9edd',muzaini:'#dc2626',mulla:'#16a34a',ansari:'#1e3a8a'};
const LABELS={bec:'BEC',muzaini:'Al Muzaini',mulla:'Al Mulla',ansari:'Al Ansari'};
const CO_MAP={'BEC':'bec','Al Muzaini':'muzaini','Al Mulla':'mulla','Al Ansari':'ansari'};

// ── ACCURATE GOV BOUNDARIES matching reference image ──────────
// Pastel colors matching reference
const GOV_DATA=[
  {name:'Al Asimah',key:'asima',
   fill:'#f0d080',stroke:'#c9a030', // pastel yellow
   label:[29.395,47.942],
   poly:[[29.455,47.820],[29.472,47.870],[29.470,47.960],[29.452,48.005],
         [29.425,48.030],[29.395,48.048],[29.368,48.048],[29.352,48.018],
         [29.338,47.988],[29.330,47.958],[29.342,47.918],[29.362,47.878],
         [29.392,47.848],[29.425,47.828]]},
  {name:'Hawalli',key:'hawally',
   fill:'#f0a0b8',stroke:'#c0507a', // pastel pink
   label:[29.318,48.085],
   poly:[[29.368,48.048],[29.395,48.048],[29.408,48.080],[29.398,48.135],
         [29.372,48.162],[29.342,48.162],[29.310,48.142],[29.288,48.112],
         [29.278,48.080],[29.288,48.050],[29.320,48.040],[29.352,48.018]]},
  {name:'Mubarak Al Kabeer',key:'mubarak',
   fill:'#b0a0d8',stroke:'#6040a0', // pastel purple
   label:[29.240,48.048],
   poly:[[29.288,48.050],[29.278,48.080],[29.288,48.112],[29.310,48.142],
         [29.288,48.162],[29.258,48.162],[29.228,48.140],[29.198,48.110],
         [29.178,48.068],[29.198,48.030],[29.228,48.010],[29.260,48.010]]},
  {name:'Al Ahmadi',key:'ahmadi',
   fill:'#f0a870',stroke:'#c06020', // pastel orange
   label:[29.060,48.080],
   poly:[[29.198,47.870],[29.198,48.030],[29.178,48.068],[29.198,48.110],
         [29.228,48.140],[29.198,48.162],[29.148,48.200],[29.078,48.200],
         [28.985,48.355],[28.952,48.402],[28.928,48.340],[28.918,48.190],
         [28.930,47.980],[28.950,47.870]]},
  {name:'Al Jahra',key:'jahra',
   fill:'#90c890',stroke:'#307830', // pastel green
   label:[29.390,47.560],
   poly:[[29.555,47.375],[29.582,47.500],[29.582,47.800],[29.558,47.872],
         [29.458,47.872],[29.420,47.872],[29.342,47.872],[29.198,47.872],
         [28.950,47.872],[28.950,47.375]]},
  {name:'Farwaniya',key:'farwaniya',
   fill:'#a0b8e8',stroke:'#3060b0', // pastel blue
   label:[29.272,47.935],
   poly:[[29.342,47.872],[29.362,47.878],[29.342,47.918],[29.330,47.958],
         [29.288,47.978],[29.258,47.978],[29.228,47.968],[29.198,47.948],
         [29.198,47.872]]}
];

// ── MAP ───────────────────────────────────────────────────────
const map=L.map('map',{center:[29.15,47.98],zoom:9,zoomControl:false});
const voyagerTile=L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19});
const labelsTile=L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png',{
  attribution:'',subdomains:'abcd',maxZoom:19,zIndex:500});

const govCanvas=document.getElementById('gov-canvas');
const govCtx=govCanvas.getContext('2d');
const heatCanvas=document.getElementById('heat-canvas');
const heatCtx=heatCanvas.getContext('2d');

function resize(){
  const w=document.getElementById('map-wrap');
  govCanvas.width=heatCanvas.width=w.clientWidth;
  govCanvas.height=heatCanvas.height=w.clientHeight;
}
resize();
window.addEventListener('resize',()=>{resize();drawGov();render();});
map.on('move zoom',()=>{drawGov();render();});

// ── BACKGROUND MODE ───────────────────────────────────────────
// ── BACKGROUND MODE ───────────────────────────────────────────
let currentBg='map';

function setBg(mode){
  currentBg=mode;
  document.getElementById('btn-map').classList.toggle('active',mode==='map');
  document.getElementById('btn-gov').classList.toggle('active',mode==='gov');
  if(mode==='map'){
    voyagerTile.addTo(map);
    labelsTile.addTo(map);
    document.getElementById('map').style.background='';
    govCanvas.style.display='none';
    govLayers.forEach(l=>l.setStyle({fillOpacity:0,weight:0,opacity:0}));
    govNameMarkers.forEach(({marker})=>map.removeLayer(marker));
    document.getElementById('legend').style.display='block';
  } else {
    voyagerTile.addTo(map);
    labelsTile.addTo(map);
    document.getElementById('map').style.background='';
    govCanvas.style.display='none';
    // No boundaries — plain map
    govLayers.forEach(l=>l.setStyle({fillOpacity:0,weight:0,opacity:0}));
    govNameMarkers.forEach(({marker})=>marker.addTo(map));
    document.getElementById('legend').style.display='none';
  }
  render();
}

function llToXY(lat,lng){const p=map.latLngToContainerPoint([lat,lng]);return[p.x,p.y];}

function drawSmoothPoly(ctx,pts){
  if(pts.length<3)return;
  ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=0;i<pts.length;i++){
    const p0=pts[(i-1+pts.length)%pts.length];
    const p1=pts[i];
    const p2=pts[(i+1)%pts.length];
    const p3=pts[(i+2)%pts.length];
    const t=0.35;
    const cp1x=p1[0]+(p2[0]-p0[0])*t/2;
    const cp1y=p1[1]+(p2[1]-p0[1])*t/2;
    const cp2x=p2[0]-(p3[0]-p1[0])*t/2;
    const cp2y=p2[1]-(p3[1]-p1[1])*t/2;
    ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,p2[0],p2[1]);
  }
  ctx.closePath();
}

function drawGov(){
  const W=govCanvas.width,H=govCanvas.height;
  govCtx.clearRect(0,0,W,H);
  if(currentBg!=='gov')return;

  // ── Background: light grey land ──
  govCtx.fillStyle='#e8e2d0';
  govCtx.fillRect(0,0,W,H);

  // ── Persian Gulf — blue sea (right side) ──
  govCtx.fillStyle='#aed4ec';
  govCtx.beginPath();
  // approximate gulf coastline from north to south
  const gulfPts=[
    llToXY(29.60,48.50),llToXY(29.55,48.15),llToXY(29.47,48.06),
    llToXY(29.40,48.05),llToXY(29.37,48.16),llToXY(29.20,48.20),
    llToXY(29.08,48.21),llToXY(28.98,48.36),llToXY(28.95,48.50),
    llToXY(28.80,48.50),llToXY(28.80,48.50),llToXY(29.60,48.50)
  ];
  gulfPts.forEach(([x,y],i)=>i===0?govCtx.moveTo(x,y):govCtx.lineTo(x,y));
  govCtx.closePath();govCtx.fill();

  // ── Iraq — slightly different tone (top left) ──
  govCtx.fillStyle='#d8d0bc';
  govCtx.beginPath();
  const iraqPts=[
    llToXY(29.60,47.38),llToXY(29.60,47.87),
    llToXY(28.95,47.87),llToXY(28.95,47.38)
  ];
  iraqPts.forEach(([x,y],i)=>i===0?govCtx.moveTo(x,y):govCtx.lineTo(x,y));
  govCtx.closePath();govCtx.fill();

  // ── Saudi Arabia — bottom ──
  govCtx.fillStyle='#d8d0bc';
  govCtx.beginPath();
  const saPts=[
    llToXY(28.95,47.38),llToXY(28.95,48.50),
    llToXY(28.75,48.50),llToXY(28.75,47.38)
  ];

// ── CSV PARSER ────────────────────────────────────────────────
function parseCSV(text){
  const lines=text.trim().split('\n');
  const headers=lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const cols=[];let cur='',inQ=false;
    for(let c=0;c<lines[i].length;c++){
      if(lines[i][c]==='"')inQ=!inQ;
      else if(lines[i][c]===','&&!inQ){cols.push(cur.trim());cur='';}
      else cur+=lines[i][c];
    }
    cols.push(cur.trim());
    if(cols.length<6)continue;
    const obj={};headers.forEach((h,idx)=>obj[h]=(cols[idx]||'').replace(/"/g,''));
    rows.push(obj);
  }
  return rows;
}

let ALL_DATA=[];
async function loadData(manual=false){
  document.getElementById('loading').style.display='flex';
  document.getElementById('lmsg').textContent=manual?'Refreshing…':'Loading from Google Sheet…';
  try{
    const resp=await fetch(SHEET_CSV+'&t='+Date.now());
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const rows=parseCSV(await resp.text());
    ALL_DATA=[];
    rows.forEach(row=>{
      if((row['Active']||'').trim().toLowerCase()!=='yes')return;
      const company=(row['Company']||'').trim();
      const name=(row['Branch Name']||'').trim();
      const area=(row['Area']||'').trim();
      const gov=(row['Governorate']||'').trim();
      const btype=(row['Type']||'').trim().toLowerCase();
      const lat=parseFloat(row['Latitude']),lng=parseFloat(row['Longitude']);
      if(!CO_MAP[company]||!name||isNaN(lat)||isNaN(lng))return;
      if(lat<28||lat>31||lng<46||lng>50)return;
      ALL_DATA.push({n:name,co:CO_MAP[company],company,area,gov,type:btype==='kiosk'?'kiosk':'branch',lat,lng});
    });
    document.getElementById('loading').style.display='none';
    document.getElementById('lu').textContent='↻ '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    updateGovBubbles();
    render();
    if(manual){const b=document.querySelector('.hdr-btn');b.textContent='✓ Done!';b.style.background='#065f46';b.style.borderColor='#16a34a';setTimeout(()=>{b.textContent='↻ Refresh';b.style.background='';b.style.borderColor='';},2000);}
  }catch(e){
    document.getElementById('loading').innerHTML=`<div style="text-align:center"><div style="color:#ef4444;font-size:14px;margin-bottom:8px">⚠️ Could not load Google Sheet</div><button onclick="loadData(true)" style="background:#1e3a5f;border:1px solid #2563eb;color:#e8eaf0;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:12px">↻ Try again</button></div>`;

}

// ── DRAW ICONS — map pin style ────────────────────────────────
function drawPin(ctx,x,y,color,iconType,size){
  const s=size*2.8; // pin overall size
  ctx.save();
  ctx.translate(x,y);

  // ── Pin shape (circle top + pointed bottom) ──
  ctx.beginPath();
  const r=s;
  // circle
  ctx.arc(0,-r*.45,r*.72,Math.PI*.18,-Math.PI*1.18,true);
  // point at bottom
  ctx.lineTo(0,r*.85);
  ctx.closePath();
  ctx.fillStyle=color;
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.85)';
  ctx.lineWidth=1.2;
  ctx.stroke();

  // ── White icon inside ──
  const ic=r*.38; // icon scale
  ctx.fillStyle='rgba(255,255,255,.95)';

  if(iconType==='branch'){
    // Building / bank icon
    const bx=-ic*.9, by=-ic*1.55, bw=ic*1.8, bh=ic*1.4;
    // Base building rect
    ctx.fillRect(bx,by,bw,bh);
    // Roof / pediment triangle
    ctx.beginPath();
    ctx.moveTo(bx-ic*.15,by);
    ctx.lineTo(0,-ic*2.05);
    ctx.lineTo(bx+bw+ic*.15,by);
    ctx.closePath();ctx.fill();
    // Door
    ctx.fillStyle=color;
    const dw=ic*.45,dh=ic*.65;
    ctx.fillRect(-dw/2,by+bh-dh,dw,dh);
    // Columns
    ctx.fillStyle='rgba(255,255,255,.95)';
    [-ic*.5,0,ic*.5].forEach(cx=>{
      ctx.fillRect(cx-ic*.08,by+ic*.05,ic*.16,ic*.7);
    });
  } else {
    // Kiosk / ATM counter icon
    // Main body
    ctx.fillRect(-ic*.75,-ic*1.6,ic*1.5,ic*1.5);
    // Screen
    ctx.fillStyle=color;
    ctx.fillRect(-ic*.5,-ic*1.45,ic,ic*.7);
    // Keypad dots
    ctx.fillStyle='rgba(255,255,255,.95)';
    for(let row=0;row<2;row++)for(let col=0;col<3;col++){
      ctx.beginPath();
      ctx.arc(-ic*.4+col*ic*.4,-ic*.55+row*ic*.22,ic*.07,0,Math.PI*2);
      ctx.fill();
    }
    // Stand/base
    ctx.fillRect(-ic*.3,-ic*.1,ic*.6,ic*.15);
    ctx.fillRect(-ic*.55,-ic*.05,ic*1.1,ic*.12);
  }

  ctx.restore();
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  const W=heatCanvas.width,H=heatCanvas.height;
  heatCtx.clearRect(0,0,W,H);
  const branches=getActive();
  if(!branches.length)return;
  const zoom=map.getZoom();
  const baseR=Math.max(18,Math.min(90,zoom*9-42));
  const showHeat=document.getElementById('cb-heat').checked;

  // Competitive and heatmap only in map view
  if(currentBg==='gov') return render_summary();

  // Competitive heatmap
  if(document.getElementById('cb-comp')&&document.getElementById('cb-comp').checked&&ALL_DATA.length){
    const compR=Math.max(25,Math.min(85,zoom*9-40));
    const pts=ALL_DATA.map(b=>{const{x,y}=toXY(b.lat,b.lng);return{x,y,we:b.co==='bec'||b.co==='ansari',r:b.type==='kiosk'?compR*.6:compR};});
    for(const p of pts){
      let we=0,comp=0;
      for(const q of pts){const d=Math.sqrt((p.x-q.x)**2+(p.y-q.y)**2);if(d<compR*1.5){const inf=1-d/(compR*1.5);if(q.we)we+=inf;else comp+=inf;}}
      if(we===0&&comp===0)continue;
      let R,G,B;
      if(we>0&&we>=comp){R=34;G=197;B=94;}else if(we>0){R=234;G=100;B=36;}else{R=239;G=68;B=68;}
      const g=heatCtx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
      g.addColorStop(0,`rgba(${R},${G},${B},0.72)`);g.addColorStop(0.5,`rgba(${R},${G},${B},0.38)`);g.addColorStop(1,`rgba(${R},${G},${B},0)`);
      heatCtx.beginPath();heatCtx.arc(p.x,p.y,p.r,0,Math.PI*2);heatCtx.fillStyle=g;heatCtx.fill();
    }
  }

  // Heatmap — red=dense, green=sparse
  if(showHeat){
    const groups={bec:[],muzaini:[],mulla:[],ansari:[]};
    for(const b of branches)if(groups[b.co])groups[b.co].push(b);
    const all=Object.values(groups).flat();
    const dens=all.map(b=>{const{x,y}=toXY(b.lat,b.lng);let v=0;for(const b2 of all){const{x:x2,y:y2}=toXY(b2.lat,b2.lng);const d=Math.sqrt((x-x2)**2+(y-y2)**2);if(d<baseR)v+=Math.pow(1-d/baseR,2);}return{x,y,v,r:b.type==='kiosk'?baseR*.6:baseR};});
    const maxV=Math.max(...dens.map(d=>d.v),1);
    for(const d of dens){
      const n=Math.min(d.v/maxV,1);
      let R,G,B;
      if(n>0.6){const t=(n-0.6)/0.4;R=220;G=Math.round(180*(1-t));B=0;}
      else if(n>0.3){const t=(n-0.3)/0.3;R=Math.round(180*t);G=200;B=0;}
      else{R=0;G=Math.round(160+n/0.3*60);B=60;}
      const alpha=0.15+n*0.35;
      const g=heatCtx.createRadialGradient(d.x,d.y,0,d.x,d.y,d.r);
      g.addColorStop(0,`rgba(${R},${G},${B},${alpha})`);g.addColorStop(0.5,`rgba(${R},${G},${B},${alpha*0.4})`);g.addColorStop(1,`rgba(${R},${G},${B},0)`);
      heatCtx.beginPath();heatCtx.arc(d.x,d.y,d.r,0,Math.PI*2);heatCtx.fillStyle=g;heatCtx.fill();
    }
  }

  // In gov mode — no pins shown, count bubbles handled by Leaflet markers
  if(currentBg==='map'){
    const iconSize=zoom>11?3.5:zoom>9?2.5:1.8;
    for(const b of branches){
      const{x,y}=toXY(b.lat,b.lng);
      const col=COLORS[b.co];
      if(b.type==='kiosk') drawKioskIcon(heatCtx,x,y,col,iconSize);
      else drawBranchIcon(heatCtx,x,y,col,iconSize);
    }
  }

  // Summary
  const c={bec:{br:0,ki:0},muzaini:{br:0,ki:0},mulla:{br:0,ki:0},ansari:{br:0,ki:0}};
  for(const b of branches)if(c[b.co])c[b.co][b.type==='kiosk'?'ki':'br']++;
  document.getElementById('s-total').textContent=branches.length;
  document.getElementById('s-rows').innerHTML=Object.entries(c).filter(([,v])=>v.br+v.ki>0).map(([co,v])=>
    `<div class="sr"><span class="sl"><span style="color:${COLORS[co]}">▲</span> ${LABELS[co]}</span><span class="sv">${v.br}${v.ki?`<span style="color:#6b7280;font-size:9px"> +${v.ki}ki</span>`:''}</span></div>`).join('');
  ['bec','muzaini','mulla','ansari'].forEach(co=>{document.getElementById('cnt-'+co).textContent=`${c[co].br+c[co].ki}`;});
}

// ── HOVER ─────────────────────────────────────────────────────
const tip=document.getElementById('htip');
let hov=null;
function findNearest(mx,my){
  const zoom=map.getZoom();const r=zoom>11?14:zoom>9?11:9;
  let best=null,minD=r;
  for(const b of getActive()){const{x,y}=toXY(b.lat,b.lng);const d=Math.sqrt((mx-x)**2+(my-y)**2);if(d<minD){minD=d;best=b;}}
  return best;
}
heatCanvas.addEventListener('mousemove',e=>{
  const rect=heatCanvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const b=findNearest(mx,my);
  if(b){
    if(b!==hov){hov=b;const col=COLORS[b.co];
      document.getElementById('hb').style.background=col;
      document.getElementById('hc').innerHTML=`<span style="color:${col}">${LABELS[b.co]}</span>`;
      document.getElementById('hn').textContent=b.n;
      document.getElementById('ht').innerHTML=
        `<span class="tag ${b.type==='kiosk'?'ki':'br'}">${b.type==='kiosk'?'⬟ Kiosk':'▲ Branch'}</span>`+
        (b.area?`<span class="tag">${b.area}</span>`:'')+
        (b.gov?`<span class="tag gv">${b.gov}</span>`:'');
    }
    const wR=document.getElementById('map-wrap').getBoundingClientRect();
    const tx=e.clientX-wR.left,ty=e.clientY-wR.top;
    tip.style.left=(tx>wR.width/2?tx-224:tx+14)+'px';
    tip.style.top=(ty>wR.height*.6?ty-130:ty+14)+'px';
    tip.style.display='block';heatCanvas.style.cursor='pointer';
  } else {hov=null;tip.style.display='none';heatCanvas.style.cursor='default';}
});
heatCanvas.addEventListener('mouseleave',()=>{hov=null;tip.style.display='none';heatCanvas.style.cursor='default';});
heatCanvas.addEventListener('click',e=>{
  const rect=heatCanvas.getBoundingClientRect();
  const b=findNearest(e.clientX-rect.left,e.clientY-rect.top);
  if(b){const col=COLORS[b.co];
    L.popup({maxWidth:240}).setLatLng([b.lat,b.lng]).setContent(`
      <div style="border-left:3px solid ${col};padding-left:10px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:${col};margin-bottom:3px;">${LABELS[b.co]}</div>
        <div style="font-size:14px;font-weight:600;margin-bottom:8px;">${b.n}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;font-size:11px;">
          <span style="background:#1e2130;padding:2px 7px;border-radius:4px;color:#9ca3af;">${b.type==='kiosk'?'⬟ Kiosk':'▲ Branch'}</span>
          ${b.area?`<span style="background:#1e2130;padding:2px 7px;border-radius:4px;color:#9ca3af;">${b.area}</span>`:''}
          ${b.gov?`<span style="background:#1a2e1a;padding:2px 7px;border-radius:4px;color:#86efac;">${b.gov}</span>`:''}
        </div>
      </div>`).openOn(map);
  } else map.closePopup();
});
heatCanvas.addEventListener('mousedown',e=>{
  const rect=heatCanvas.getBoundingClientRect();
  if(!findNearest(e.clientX-rect.left,e.clientY-rect.top)){
    const pane=document.querySelector('.leaflet-map-pane');
    if(pane)pane.dispatchEvent(new MouseEvent('mousedown',{bubbles:true,cancelable:true,clientX:e.clientX,clientY:e.clientY,button:e.button}));
  }
});

// ── BOOT ──────────────────────────────────────────────────────
setBg('map');
loadData();
</script>
</body>
</html>
