<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Kuwait Exchange Network — Heatmap</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e8eaf0;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
#header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#0f1117;border-bottom:1px solid #1e2130;flex-shrink:0;flex-wrap:wrap;gap:6px;z-index:1001;}
#header h1{font-size:13px;font-weight:600;letter-spacing:.4px;color:#e8eaf0;white-space:nowrap;}
#header h1 span{color:#4b5563;font-weight:400;margin-left:6px;font-size:11px;}
#controls{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.btn-group{display:flex;gap:3px;align-items:center;background:#1a1d2e;border:1px solid #2a2d3e;border-radius:7px;padding:3px 7px;}
.btn-group label{display:flex;align-items:center;gap:3px;font-size:11px;cursor:pointer;white-space:nowrap;color:#9ca3af;}
.btn-group label:hover{color:#e8eaf0;}
.chip{display:inline-block;padding:1px 7px;border-radius:3px;font-size:10px;font-weight:700;color:#fff;letter-spacing:.3px;}
.chip.bec{background:#2563eb;}.chip.muzaini{background:#dc2626;}.chip.mulla{background:#16a34a;}.chip.ansari{background:#d97706;}
.ctl-cnt{font-size:10px;color:#6b7280;margin-left:1px;}
.tog{display:flex;align-items:center;gap:3px;font-size:11px;cursor:pointer;color:#9ca3af;padding:3px 7px;background:#1a1d2e;border:1px solid #2a2d3e;border-radius:7px;}
.tog:hover{color:#e8eaf0;}
.hdr-btn{display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer;color:#e8eaf0;padding:4px 10px;background:#1e3a5f;border:1px solid #2563eb;border-radius:7px;white-space:nowrap;font-family:inherit;}
.hdr-btn:hover{background:#1d4ed8;}

/* Background toggle pill */
#bg-toggle{display:flex;background:#1a1d2e;border:1px solid #2a2d3e;border-radius:7px;overflow:hidden;}
.bgt-btn{padding:3px 10px;font-size:11px;cursor:pointer;border:none;background:transparent;color:#9ca3af;font-family:inherit;transition:all .2s;}
.bgt-btn.active{background:#2563eb;color:#fff;}
.bgt-btn:hover:not(.active){color:#e8eaf0;}

#map-wrap{flex:1;position:relative;overflow:hidden;}
#map{width:100%;height:100%;}
#heat-canvas{position:absolute;top:0;left:0;pointer-events:all;z-index:400;cursor:default;}

/* Gov color overlay canvas — sits under heat */
#gov-canvas{position:absolute;top:0;left:0;pointer-events:none;z-index:200;}

/* Zoom buttons */
#zoom-btns{position:absolute;bottom:100px;left:10px;z-index:1000;display:flex;flex-direction:column;gap:4px;}
.zbtn{width:32px;height:32px;background:rgba(15,17,23,.9);border:1px solid #2a2d3e;border-radius:7px;color:#e8eaf0;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
.zbtn:hover{background:#1a1d2e;border-color:#2563eb;}

/* Hover tooltip */
#htip{position:absolute;z-index:2000;pointer-events:none;display:none;background:rgba(8,10,18,.97);border:1px solid #2a2d3e;border-radius:10px;padding:12px 15px;width:210px;box-shadow:0 10px 40px rgba(0,0,0,.8);backdrop-filter:blur(10px);}
#htip .ht-bar{height:3px;border-radius:2px;margin-bottom:10px;}
#htip .ht-co{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;margin-bottom:4px;}
#htip .ht-name{font-size:13px;font-weight:600;color:#f1f5f9;line-height:1.3;margin-bottom:8px;}
#htip .ht-tags{display:flex;gap:5px;flex-wrap:wrap;}
#htip .tag{font-size:10px;padding:2px 8px;border-radius:4px;background:#1e2130;color:#9ca3af;}
#htip .tag.type-branch{background:#1e3a5f;color:#93c5fd;}
#htip .tag.type-kiosk{background:#3b1e1e;color:#fca5a5;}
#htip .tag.gov{background:rgba(255,255,255,.1);color:#d1d5db;}

/* Governorate stats panel */
#gov-panel{position:absolute;z-index:2000;display:none;background:rgba(8,10,18,.97);border:1px solid #2a2d3e;border-radius:12px;padding:0;width:270px;box-shadow:0 12px 48px rgba(0,0,0,.85);backdrop-filter:blur(12px);overflow:hidden;}
#gov-panel .gp-head{padding:13px 15px 10px;border-bottom:1px solid #1e2130;}
#gov-panel .gp-title{font-size:14px;font-weight:600;color:#f1f5f9;margin-bottom:2px;}
#gov-panel .gp-total{font-size:11px;color:#6b7280;}
#gov-panel .gp-close{position:absolute;top:10px;right:12px;background:none;border:none;color:#6b7280;font-size:16px;cursor:pointer;}
#gov-panel .gp-close:hover{color:#e8eaf0;}
#gov-panel .gp-body{padding:10px 15px 14px;}
.gp-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:.5px solid #1e2130;}
.gp-row:last-child{border-bottom:none;}
.gp-co{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:500;color:#e8eaf0;}
.gp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.gp-counts{display:flex;gap:5px;align-items:center;}
.gp-badge{font-size:10px;padding:1px 7px;border-radius:4px;}
.gp-br{background:#1e3a5f;color:#93c5fd;}
.gp-ki{background:#3b1e1e;color:#fca5a5;}
.gp-zero{color:#374151;font-size:11px;}
.gp-bar-wrap{margin-top:10px;padding-top:8px;border-top:1px solid #1e2130;}
.gp-bar-label{font-size:10px;color:#6b7280;margin-bottom:5px;}
.gp-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.gp-bar-name{font-size:10px;color:#9ca3af;width:62px;flex-shrink:0;}
.gp-bar-track{flex:1;height:5px;background:#1e2130;border-radius:3px;overflow:hidden;}
.gp-bar-fill{height:100%;border-radius:3px;}
.gp-bar-num{font-size:10px;color:#6b7280;width:22px;text-align:right;}

#sumbox{position:absolute;top:10px;left:10px;z-index:1000;background:rgba(8,10,18,.93);border:1px solid #2a2d3e;border-radius:9px;padding:10px 13px;font-size:11px;color:#9ca3af;backdrop-filter:blur(6px);min-width:150px;}
#sumbox .st{font-weight:600;color:#e8eaf0;font-size:13px;margin-bottom:6px;}
.sr{display:flex;justify-content:space-between;gap:10px;margin-bottom:2px;}
.sl{color:#9ca3af;}.sv{color:#e8eaf0;font-weight:500;}
#last-updated{font-size:9px;color:#4b5563;margin-top:6px;border-top:1px solid #1e2130;padding-top:5px;}

#legend{position:absolute;bottom:30px;right:10px;z-index:1000;background:rgba(8,10,18,.93);border:1px solid #2a2d3e;border-radius:9px;padding:10px 13px;font-size:11px;color:#9ca3af;backdrop-filter:blur(6px);}
#legend .lt{font-weight:600;color:#e8eaf0;margin-bottom:6px;font-size:12px;}
.lr{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.ls{width:9px;height:9px;border-radius:50%;}
.ld{width:8px;height:8px;transform:rotate(45deg);}
.grad-bar{width:80px;height:6px;border-radius:3px;background:linear-gradient(to right,rgba(0,80,255,0),rgba(0,200,100,.5),rgba(255,200,0,.75),rgba(255,80,0,.9),rgba(200,0,0,1));}

.leaflet-popup-content-wrapper{background:rgba(8,10,18,.97)!important;border:1px solid #2a2d3e!important;border-radius:10px!important;color:#e8eaf0!important;box-shadow:0 8px 32px rgba(0,0,0,.7)!important;}
.leaflet-popup-content{margin:12px 15px!important;font-size:12px!important;line-height:1.6!important;}
.leaflet-popup-tip{background:rgba(8,10,18,.97)!important;}
.leaflet-popup-close-button{color:#9ca3af!important;font-size:16px!important;}

#loading{position:absolute;inset:0;background:rgba(8,10,18,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:3000;gap:14px;}
#loading p{color:#9ca3af;font-size:13px;}
.spinner{width:32px;height:32px;border:3px solid #1e2130;border-top:3px solid #2563eb;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.area-label{background:transparent!important;border:none!important;box-shadow:none!important;}
.area-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.8px;text-transform:uppercase;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,.9);}
.gov-name-label{background:transparent!important;border:none!important;box-shadow:none!important;}
.gov-name-lbl{font-size:13px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;text-shadow:0 2px 6px rgba(0,0,0,.7);pointer-events:none;}
</style>
</head>
<body>

<div id="header">
  <h1>Kuwait Exchange Network <span>● branch &nbsp;◆ kiosk</span></h1>
  <div id="controls">
    <div class="btn-group">
      <label><input type="checkbox" id="cb-bec" checked onchange="render()"><span class="chip bec">BEC</span><span class="ctl-cnt" id="cnt-bec"></span></label>
      <label><input type="checkbox" id="cb-muzaini" checked onchange="render()"><span class="chip muzaini">Muzaini</span><span class="ctl-cnt" id="cnt-muzaini"></span></label>
      <label><input type="checkbox" id="cb-mulla" checked onchange="render()"><span class="chip mulla">Al Mulla</span><span class="ctl-cnt" id="cnt-mulla"></span></label>
      <label><input type="checkbox" id="cb-ansari" checked onchange="render()"><span class="chip ansari">Al Ansari</span><span class="ctl-cnt" id="cnt-ansari"></span></label>
    </div>
    <div class="btn-group">
      <label><input type="checkbox" id="cb-branch" checked onchange="render()">Branches</label>
      <label><input type="checkbox" id="cb-kiosk" checked onchange="render()">Kiosks</label>
    </div>
    <!-- Background toggle -->
    <div id="bg-toggle">
      <button class="bgt-btn active" id="btn-govmap" onclick="setBg('govmap')">🗺 Map View</button>
      <button class="bgt-btn" id="btn-streets" onclick="setBg('streets')">🏛 Governorate View</button>
    </div>
    <label class="tog"><input type="checkbox" id="cb-heat" checked onchange="render()">Heatmap</label>
    <label class="tog"><input type="checkbox" id="cb-grid" onchange="toggleGrid()">Grid</label>
    <label class="tog"><input type="checkbox" id="cb-areas" onchange="toggleAreas()">Areas</label>
    <button class="hdr-btn" onclick="loadData(true)">↻ Refresh</button>
  </div>
</div>

<div id="map-wrap">
  <div id="map"></div>
  <canvas id="gov-canvas"></canvas>
  <canvas id="heat-canvas"></canvas>

  <div id="zoom-btns">
    <button class="zbtn" onclick="map.zoomIn()">+</button>
    <button class="zbtn" onclick="map.zoomOut()">−</button>
    <button class="zbtn" style="font-size:13px" onclick="map.setView([29.20,47.98],9)">⌂</button>
  </div>

  <div id="htip">
    <div class="ht-bar" id="ht-bar"></div>
    <div class="ht-co"  id="ht-co"></div>
    <div class="ht-name" id="ht-name"></div>
    <div class="ht-tags" id="ht-tags"></div>
  </div>

  <div id="gov-panel">
    <div class="gp-head">
      <div class="gp-title" id="gp-title"></div>
      <div class="gp-total" id="gp-total"></div>
      <button class="gp-close" onclick="closeGovPanel()">✕</button>
    </div>
    <div class="gp-body" id="gp-body"></div>
  </div>

  <div id="sumbox">
    <div class="st">📍 <span id="s-total">0</span> locations</div>
    <div id="s-rows"></div>
    <div id="last-updated"></div>
  </div>

  <div id="legend">
    <div class="lt">Branch density</div>
    <div class="lr"><div class="grad-bar"></div><span style="font-size:10px">low → high</span></div>
    <div style="margin-top:7px;border-top:1px solid #2a2d3e;padding-top:7px;">
      <div class="lr"><div class="ls" style="background:#2563eb"></div>BEC</div>
      <div class="lr"><div class="ls" style="background:#dc2626"></div>Al Muzaini</div>
      <div class="lr"><div class="ls" style="background:#16a34a"></div>Al Mulla</div>
      <div class="lr"><div class="ls" style="background:#d97706"></div>Al Ansari</div>
      <div style="margin-top:5px;border-top:1px solid #2a2d3e;padding-top:5px;">
        <div class="lr"><div class="ls" style="background:#6b7280"></div>Branch ●</div>
        <div class="lr"><div class="ld" style="background:#6b7280"></div>Kiosk ◆</div>
      </div>
    </div>
  </div>

  <div id="loading"><div class="spinner"></div><p id="loading-msg">Loading from Google Sheet…</p></div>
</div>

<script>
const SHEET_CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vR0DcCB5P3DupJTwxRgcvCPX8RxirRRCV6I8y_oqJpQd-IvsVdVsY52o2csxhwDe8N29nP35gvLmz6-/pub?gid=0&single=true&output=csv';
const COLORS={bec:'#2563eb',muzaini:'#dc2626',mulla:'#16a34a',ansari:'#d97706'};
const LABELS={bec:'BEC',muzaini:'Al Muzaini',mulla:'Al Mulla',ansari:'Al Ansari'};
const CO_MAP={'BEC':'bec','Al Muzaini':'muzaini','Al Mulla':'mulla','Al Ansari':'ansari'};

// ── GOVERNORATE DATA — accurate boundaries + colors matching reference ──
const GOV_DATA=[
  {
    name:'Al Asimah',key:'asima',
    color:'#c9a227',fillColor:'#e8c547',  // gold/yellow like reference
    labelPos:[29.390,47.940],
    // Tight polygon around Kuwait City peninsula
    poly:[
      [29.455,47.820],[29.470,47.870],[29.470,47.960],[29.455,48.000],
      [29.430,48.030],[29.400,48.050],[29.370,48.050],[29.355,48.020],
      [29.340,47.990],[29.330,47.960],[29.340,47.920],[29.360,47.880],
      [29.390,47.850],[29.420,47.830],[29.455,47.820]
    ]
  },
  {
    name:'Hawalli',key:'hawally',
    color:'#b83280',fillColor:'#e879a0',  // pink like reference
    labelPos:[29.310,48.075],
    poly:[
      [29.370,48.050],[29.400,48.050],[29.410,48.080],[29.400,48.130],
      [29.370,48.160],[29.340,48.160],[29.310,48.140],[29.290,48.110],
      [29.280,48.080],[29.290,48.050],[29.320,48.040],[29.355,48.020],
      [29.370,48.050]
    ]
  },
  {
    name:'Mubarak Al Kabeer',key:'mubarak',
    color:'#5b21b6',fillColor:'#7c3aed',  // purple like reference
    labelPos:[29.235,48.040],
    poly:[
      [29.290,48.050],[29.280,48.080],[29.290,48.110],[29.310,48.140],
      [29.290,48.160],[29.260,48.160],[29.230,48.140],[29.200,48.110],
      [29.180,48.070],[29.200,48.030],[29.230,48.010],[29.260,48.010],
      [29.290,48.050]
    ]
  },
  {
    name:'Al Ahmadi',key:'ahmadi',
    color:'#c2410c',fillColor:'#f97316',  // orange like reference
    labelPos:[29.050,48.100],
    poly:[
      [29.200,47.870],[29.200,48.030],[29.180,48.070],[29.200,48.110],
      [29.230,48.140],[29.200,48.160],[29.150,48.200],[29.080,48.200],
      [28.980,48.350],[28.950,48.400],[28.930,48.340],[28.920,48.200],
      [28.930,48.000],[28.950,47.870],[29.000,47.870],[29.200,47.870]
    ]
  },
  {
    name:'Al Jahra',key:'jahra',
    color:'#166534',fillColor:'#22c55e',  // green like reference
    labelPos:[29.380,47.580],
    poly:[
      [29.550,47.380],[29.580,47.500],[29.580,47.800],[29.560,47.870],
      [29.460,47.870],[29.420,47.870],[29.340,47.870],[29.200,47.870],
      [29.000,47.870],[28.950,47.750],[28.950,47.500],[28.950,47.380],
      [29.550,47.380]
    ]
  },
  {
    name:'Farwaniya',key:'farwaniya',
    color:'#1e40af',fillColor:'#3b82f6',  // blue — added for completeness
    labelPos:[29.270,47.920],
    poly:[
      [29.340,47.870],[29.360,47.880],[29.340,47.920],[29.330,47.960],
      [29.290,47.980],[29.260,47.980],[29.230,47.970],[29.200,47.950],
      [29.200,47.870],[29.340,47.870]
    ]
  },
];

const AREAS=[
  ["KUWAIT CITY",29.375,47.978],["SALMIYA",29.331,48.060],
  ["HAWALLY",29.345,48.025],["FARWANIYA",29.274,47.955],
  ["KHAITAN",29.293,47.976],["JLEEB",29.260,47.929],
  ["JAHRA",29.340,47.700],["FAHAHEEL",29.082,48.131],
  ["MAHBOULA",29.150,48.118],["MANGAF",29.102,48.128],
  ["AHMADI",29.103,48.075],["EGAILA",29.089,48.095],
];

// ── MAP INIT ──────────────────────────────────────────────────
const map=L.map('map',{center:[29.20,47.98],zoom:9,zoomControl:false,attributionControl:true});

// Two tile layers
const voyagerTile=L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19
});
const lightTile=L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19
});

let currentBg='govmap';
voyagerTile.addTo(map); // start with Voyager street map

// ── CANVASES ──────────────────────────────────────────────────
const govCanvas=document.getElementById('gov-canvas');
const govCtx=govCanvas.getContext('2d');
const heatCanvas=document.getElementById('heat-canvas');
const heatCtx=heatCanvas.getContext('2d');

function resizeCanvases(){
  const w=document.getElementById('map-wrap');
  const W=w.clientWidth,H=w.clientHeight;
  govCanvas.width=W;govCanvas.height=H;
  heatCanvas.width=W;heatCanvas.height=H;
}
resizeCanvases();
window.addEventListener('resize',()=>{resizeCanvases();drawGovMap();render();});
map.on('move zoom',()=>{drawGovMap();render();});

// ── BACKGROUND TOGGLE ─────────────────────────────────────────
function setBg(mode){
  currentBg=mode;
  document.getElementById('btn-govmap').classList.toggle('active',mode==='govmap');
  document.getElementById('btn-streets').classList.toggle('active',mode==='streets');

  if(mode==='govmap'){
    // MAP VIEW — Voyager street tiles, no gov canvas overlay
    map.removeLayer(lightTile);
    voyagerTile.addTo(map);
    document.getElementById('map').style.background='';
    govCanvas.style.display='none';
    govCtx.clearRect(0,0,govCanvas.width,govCanvas.height);
    // Show subtle gov outlines on top of streets
    govLayers.forEach((l,i)=>{
      const gov=GOV_DATA[i];
      l.setStyle({
        color:gov.color,weight:2,opacity:.6,
        fillColor:gov.fillColor,fillOpacity:.06,
        dashArray:'5,4'
      });
    });
    govNameMarkers.forEach(m=>map.removeLayer(m));
  } else {
    // GOVERNORATE VIEW — no tiles at all, full canvas like reference image
    map.removeLayer(voyagerTile);
    map.removeLayer(lightTile);
    document.getElementById('map').style.background='#e8e2d0';
    govCanvas.style.display='block';
    govLayers.forEach(l=>l.setStyle({fillOpacity:0,weight:0,opacity:0}));
    govNameMarkers.forEach(m=>map.removeLayer(m));
    drawGovMap();
  }
  render();
}

// ── DRAW GOV COLORED MAP ON CANVAS ───────────────────────────
function latLngToPoint(lat,lng){
  const p=map.latLngToContainerPoint([lat,lng]);
  return[p.x,p.y];
}

function drawGovMap(){
  const W=govCanvas.width,H=govCanvas.height;
  govCtx.clearRect(0,0,W,H);
  if(currentBg!=='streets') return; // only draw in Governorate View

  // ── Land background — sandy beige like reference ──
  govCtx.fillStyle='#e8e2d0';
  govCtx.fillRect(0,0,W,H);

  // ── Iraq area — slightly cooler sand (top-left) ──
  govCtx.fillStyle='#ddd6c0';
  const iraqPts=[
    latLngToPoint(29.60,47.38),latLngToPoint(29.60,47.80),
    latLngToPoint(29.20,47.87),latLngToPoint(28.95,47.87),
    latLngToPoint(28.95,47.38)
  ];
  govCtx.beginPath();
  iraqPts.forEach(([x,y],i)=>i===0?govCtx.moveTo(x,y):govCtx.lineTo(x,y));
  govCtx.closePath();govCtx.fill();

  // ── Saudi Arabia area — bottom ──
  govCtx.fillStyle='#ddd6c0';
  const saPts=[
    latLngToPoint(28.95,47.38),latLngToPoint(28.95,48.50),
    latLngToPoint(28.80,48.50),latLngToPoint(28.80,47.38)
  ];
  govCtx.beginPath();
  saPts.forEach(([x,y],i)=>i===0?govCtx.moveTo(x,y):govCtx.lineTo(x,y));
  govCtx.closePath();govCtx.fill();

  // ── Persian Gulf — light blue on right ──
  govCtx.fillStyle='#b8d9f0';
  const gulfPts=[
    latLngToPoint(29.60,48.10),latLngToPoint(29.60,48.50),
    latLngToPoint(28.80,48.50),latLngToPoint(28.80,48.10),
    latLngToPoint(29.00,48.05),latLngToPoint(29.15,48.20),
    latLngToPoint(29.30,48.18),latLngToPoint(29.48,48.08)
  ];
  govCtx.beginPath();
  gulfPts.forEach(([x,y],i)=>i===0?govCtx.moveTo(x,y):govCtx.lineTo(x,y));
  govCtx.closePath();govCtx.fill();

  // ── Draw governorates with smooth fills ──
  GOV_DATA.forEach(gov=>{
    const pts=gov.poly.map(([lat,lng])=>latLngToPoint(lat,lng));
    if(pts.length<3)return;
    govCtx.beginPath();
    drawSmoothPoly(govCtx,pts,true);
    govCtx.fillStyle=gov.fillColor+'ee';
    govCtx.fill();
    govCtx.strokeStyle='rgba(255,255,255,.6)';
    govCtx.lineWidth=2;
    govCtx.lineJoin='round';
    govCtx.stroke();
  });

  // ── Governorate name labels ──
  GOV_DATA.forEach(gov=>{
    const[x,y]=latLngToPoint(gov.labelPos[0],gov.labelPos[1]);
    govCtx.save();
    govCtx.font='bold 12px "Segoe UI",sans-serif';
    govCtx.textAlign='center';govCtx.textBaseline='middle';
    // White halo
    govCtx.strokeStyle='rgba(255,255,255,.9)';
    govCtx.lineWidth=3;
    govCtx.strokeText(gov.name,x,y);
    govCtx.fillStyle='#1a1a1a';
    govCtx.fillText(gov.name,x,y);
    govCtx.restore();
  });
}

// Smooth polygon using cardinal spline
function drawSmoothPoly(ctx,pts,closed){
  if(pts.length<2)return;
  const tension=0.4;
  ctx.moveTo(pts[0][0],pts[0][1]);
  const all=closed?[...pts,pts[0],pts[1]]:pts;
  for(let i=0;i<(closed?pts.length:pts.length-1);i++){
    const p0=all[i]||pts[0];
    const p1=all[i+1];
    const p2=all[i+2]||pts[pts.length-1];
    const cp1x=p1[0]-(p2[0]-p0[0])*tension/2;
    const cp1y=p1[1]-(p2[1]-p0[1])*tension/2;
    const p3=all[i+3]||pts[pts.length-1];
    const cp2x=p2[0]+(p3[0]-p1[0])*tension/2;
    const cp2y=p2[1]+(p3[1]-p1[1])*tension/2;
    if(i<(closed?pts.length:pts.length-2)){
      ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,p2[0],p2[1]);
    } else {
      ctx.lineTo(p2[0],p2[1]);
    }
  }
  if(closed)ctx.closePath();
}

// ── LEAFLET GOV POLYGONS (for click + streets color fill) ─────
let govLayers=[];
let govNameMarkers=[];
function buildGovLayers(){
  govLayers.forEach(l=>map.removeLayer(l));
  govNameMarkers.forEach(m=>map.removeLayer(m));
  govLayers=[];govNameMarkers=[];

  GOV_DATA.forEach(gov=>{
    // Polygon — invisible in govmap mode, colored in streets mode
    const poly=L.polygon(gov.poly,{
      color:gov.color,weight:0,opacity:0,fillOpacity:0,interactive:true
    });
    poly.on('click',function(e){
      L.DomEvent.stopPropagation(e);
      showGovPanel(gov,e.originalEvent.clientX,e.originalEvent.clientY);
    });
    poly.on('mouseover',function(){
      if(currentBg==='streets') this.setStyle({fillOpacity:.28});
    });
    poly.on('mouseout',function(){
      if(currentBg==='streets') this.setStyle({fillOpacity:.18});
    });
    poly.addTo(map);
    govLayers.push(poly);

    // Name label marker — shown in streets mode
    const icon=L.divIcon({
      className:'gov-name-label',
      html:`<div class="gov-name-lbl" style="color:${gov.color};font-size:11px;">${gov.name.toUpperCase()}</div>`,
      iconAnchor:[40,8]
    });
    const m=L.marker(gov.labelPos,{icon,interactive:false,zIndexOffset:-50});
    govNameMarkers.push(m);
  });
}
buildGovLayers();

// ── GRID ──────────────────────────────────────────────────────
let gridLayer=null;
function buildGrid(){
  const lines=[];
  for(let lat=28.9;lat<=29.6;lat+=0.05)lines.push(L.polyline([[lat,47.3],[lat,48.6]],{color:'rgba(90,110,170,.2)',weight:1,dashArray:'3,7'}));
  for(let lng=47.3;lng<=48.6;lng+=0.05)lines.push(L.polyline([[28.8,lng],[29.7,lng]],{color:'rgba(90,110,170,.2)',weight:1,dashArray:'3,7'}));
  gridLayer=L.layerGroup(lines);
}
buildGrid();
function toggleGrid(){if(document.getElementById('cb-grid').checked)gridLayer.addTo(map);else if(gridLayer)map.removeLayer(gridLayer);}

// ── AREA LABELS ───────────────────────────────────────────────
let areaMarkers=[];
function buildAreas(){
  areaMarkers.forEach(m=>map.removeLayer(m));areaMarkers=[];
  AREAS.forEach(([name,lat,lng])=>{
    const col=currentBg==='govmap'?'rgba(0,0,0,.55)':'rgba(255,255,255,.5)';
    const icon=L.divIcon({className:'area-label',html:`<div class="area-lbl" style="color:${col};text-shadow:0 1px 3px rgba(255,255,255,.7)">${name}</div>`,iconAnchor:[0,0]});
    areaMarkers.push(L.marker([lat,lng],{icon,interactive:false,zIndexOffset:-100}).addTo(map));

}
function toggleAreas(){

  if(document.getElementById('cb-areas').checked)buildAreas();
}

// ── GOV PANEL ─────────────────────────────────────────────────
function showGovPanel(gov,cx,cy){
  const panel=document.getElementById('gov-panel');
  const wrap=document.getElementById('map-wrap');
  const wRect=wrap.getBoundingClientRect();
  const cos=['bec','muzaini','mulla','ansari'];
  const stats={};
  cos.forEach(co=>stats[co]={branch:0,kiosk:0});

  ALL_DATA.forEach(b=>{
    const gk=(b.gov||'').toLowerCase();
    let match=false;
    if(gov.key==='asima')match=gk.includes('asima')||gk.includes('capital')||gk.includes('kuwait city')||gk.includes('asimah');
    else if(gov.key==='hawally')match=gk.includes('hawally')||gk.includes('hawalli');
    else if(gov.key==='mubarak')match=gk.includes('mubarak')||gk.includes('kabeer')||gk.includes('kabir');
    else if(gov.key==='ahmadi')match=gk.includes('ahmadi');
    else if(gov.key==='jahra')match=gk.includes('jahra');
    else if(gov.key==='farwaniya')match=gk.includes('farwaniya')||gk.includes('farwaniyah');
    if(match&&stats[b.co])stats[b.co][b.type]++;
  });

  const total=cos.reduce((s,co)=>s+stats[co].branch+stats[co].kiosk,0);
  const maxTot=Math.max(...cos.map(co=>stats[co].branch+stats[co].kiosk),1);

  // Header color band
  document.getElementById('gov-panel').style.borderTopColor=gov.fillColor;
  document.getElementById('gp-title').innerHTML=`<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${gov.fillColor};margin-right:7px;vertical-align:middle"></span>${gov.name} Governorate`;
  document.getElementById('gp-total').textContent=`${total} total locations`;

  let html='';
  cos.forEach(co=>{
    const br=stats[co].branch,ki=stats[co].kiosk,tot=br+ki;
    html+=`<div class="gp-row">
      <div class="gp-co"><div class="gp-dot" style="background:${COLORS[co]}"></div>${LABELS[co]}</div>
      <div class="gp-counts">
        ${br>0?`<span class="gp-badge gp-br">● ${br}br</span>`:''}
        ${ki>0?`<span class="gp-badge gp-ki">◆ ${ki}ki</span>`:''}
        ${tot===0?`<span class="gp-zero">—</span>`:''}
      </div>
    </div>`;
  });

  html+=`<div class="gp-bar-wrap"><div class="gp-bar-label">Relative coverage</div>`;
  cos.forEach(co=>{
    const tot=stats[co].branch+stats[co].kiosk;
    const pct=Math.round(tot/maxTot*100);
    html+=`<div class="gp-bar-row">
      <div class="gp-bar-name">${LABELS[co]}</div>
      <div class="gp-bar-track"><div class="gp-bar-fill" style="width:${pct}%;background:${COLORS[co]}"></div></div>
      <div class="gp-bar-num">${tot}</div>
    </div>`;
  });
  html+=`</div>`;
  document.getElementById('gp-body').innerHTML=html;

  const pw=280,ph=360;
  const tx=cx-wRect.left,ty=cy-wRect.top;
  let left=tx+14,top=ty+14;
  if(left+pw>wRect.width-10)left=tx-pw-14;
  if(top+ph>wRect.height-10)top=ty-ph-14;
  panel.style.left=Math.max(10,left)+'px';
  panel.style.top=Math.max(10,top)+'px';
  panel.style.display='block';
}
function closeGovPanel(){document.getElementById('gov-panel').style.display='none';}
map.on('click',closeGovPanel);

// ── CSV PARSER ────────────────────────────────────────────────
function parseCSV(text){
  const lines=text.trim().split('\n');
  const headers=lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const cols=[];let cur='',inQ=false;
    for(let c=0;c<lines[i].length;c++){
      if(lines[i][c]==='"')inQ=!inQ;
      else if(lines[i][c]===','&&!inQ){cols.push(cur.trim());cur='';}
      else cur+=lines[i][c];
    }
    cols.push(cur.trim());
    if(cols.length<7)continue;
    const obj={};headers.forEach((h,idx)=>obj[h]=(cols[idx]||'').replace(/"/g,''));
    rows.push(obj);
  }
  return rows;
}

// ── LOAD DATA ─────────────────────────────────────────────────
let ALL_DATA=[];
async function loadData(manual=false){
  document.getElementById('loading').style.display='flex';
  document.getElementById('loading-msg').textContent=manual?'Refreshing from Google Sheet…':'Loading from Google Sheet…';
  try{
    const resp=await fetch(SHEET_CSV_URL+'&t='+Date.now());
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const rows=parseCSV(await resp.text());
    ALL_DATA=[];
    rows.forEach(row=>{
      if((row['Active']||'').trim().toLowerCase()!=='yes')return;
      const company=(row['Company']||'').trim();
      const name=(row['Branch Name']||'').trim();
      const area=(row['Area']||'').trim();
      const gov=(row['Governorate']||'').trim();
      const btype=(row['Type']||'').trim().toLowerCase();
      const lat=parseFloat(row['Latitude']);
      const lng=parseFloat(row['Longitude']);
      if(!CO_MAP[company]||!name||isNaN(lat)||isNaN(lng))return;
      if(lat<28||lat>31||lng<46||lng>50)return;
      ALL_DATA.push({n:name,co:CO_MAP[company],company,area,gov,type:btype==='kiosk'?'kiosk':'branch',lat,lng});
    });
    document.getElementById('loading').style.display='none';
    document.getElementById('last-updated').textContent='↻ Updated '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    render();
    if(manual){
      const btn=document.querySelector('.hdr-btn');
      btn.textContent='✓ Done!';btn.style.background='#065f46';btn.style.borderColor='#16a34a';
      setTimeout(()=>{btn.textContent='↻ Refresh';btn.style.background='';btn.style.borderColor='';},2000);
    }
  }catch(e){
    document.getElementById('loading').innerHTML=`<div style="text-align:center;padding:20px;">
      <div style="color:#ef4444;font-size:14px;font-weight:600;margin-bottom:8px;">⚠️ Could not load Google Sheet</div>
      <div style="color:#6b7280;font-size:12px;margin-bottom:12px;">Make sure the sheet is published as CSV</div>
      <button onclick="loadData(true)" style="background:#1e3a5f;border:1px solid #2563eb;color:#e8eaf0;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:12px;">↻ Try again</button>
    </div>`;
  }
}

// ── FILTER ────────────────────────────────────────────────────
function getActive(){
  const bec=document.getElementById('cb-bec').checked;
  const muz=document.getElementById('cb-muzaini').checked;
  const mul=document.getElementById('cb-mulla').checked;
  const ans=document.getElementById('cb-ansari').checked;
  const br=document.getElementById('cb-branch').checked;
  const ki=document.getElementById('cb-kiosk').checked;
  return ALL_DATA.filter(b=>{
    const coOk=(b.co==='bec'&&bec)||(b.co==='muzaini'&&muz)||(b.co==='mulla'&&mul)||(b.co==='ansari'&&ans);
    const tyOk=(b.type==='branch'&&br)||(b.type==='kiosk'&&ki);
    return coOk&&tyOk;
  });
}

function toXY(lat,lng){const p=map.latLngToContainerPoint([lat,lng]);return{x:p.x,y:p.y};}
function hex2rgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}

// ── RENDER HEATMAP ────────────────────────────────────────────
function render(){
  const W=heatCanvas.width,H=heatCanvas.height;
  heatCtx.clearRect(0,0,W,H);
  const branches=getActive();
  if(!branches.length)return;
  const zoom=map.getZoom();
  const baseR=Math.max(18,Math.min(90,zoom*9-42));
  const combined=document.getElementById('cb-combined')&&document.getElementById('cb-combined').checked;

  const showHeat=document.getElementById('cb-heat').checked;

  if(showHeat){
    const groups={bec:[],muzaini:[],mulla:[],ansari:[]};
    for(const b of branches)if(groups[b.co])groups[b.co].push(b);
    for(const[co,pts]of Object.entries(groups)){
      if(!pts.length)continue;
      const[R,G,B]=hex2rgb(COLORS[co]);
      for(const b of pts){
        const{x,y}=toXY(b.lat,b.lng);
        const r=b.type==='kiosk'?baseR*.65:baseR;
        const g=heatCtx.createRadialGradient(x,y,0,x,y,r);
        const a=b.type==='kiosk'?.20:.28;
        g.addColorStop(0,`rgba(${R},${G},${B},${a})`);
        g.addColorStop(.45,`rgba(${R},${G},${B},${a*.4})`);
        g.addColorStop(1,`rgba(${R},${G},${B},0)`);
        heatCtx.beginPath();heatCtx.arc(x,y,r,0,Math.PI*2);heatCtx.fillStyle=g;heatCtx.fill();
      }
    }
  }

  const dotR=zoom>11?4.5:zoom>9?3.5:2.5;
  for(const b of branches){
    const{x,y}=toXY(b.lat,b.lng);
    const col=COLORS[b.co];
    if(b.type==='kiosk'){
      heatCtx.save();heatCtx.translate(x,y);heatCtx.rotate(Math.PI/4);
      heatCtx.fillStyle=col;heatCtx.fillRect(-dotR*.8,-dotR*.8,dotR*1.6,dotR*1.6);
      heatCtx.strokeStyle='rgba(255,255,255,.7)';heatCtx.lineWidth=1;heatCtx.strokeRect(-dotR*.8,-dotR*.8,dotR*1.6,dotR*1.6);
      heatCtx.restore();
    } else {
      heatCtx.beginPath();heatCtx.arc(x,y,dotR,0,Math.PI*2);
      heatCtx.fillStyle=col;heatCtx.fill();
      heatCtx.strokeStyle='rgba(255,255,255,.7)';heatCtx.lineWidth=1;heatCtx.stroke();
    }
  }

  const c={bec:{br:0,ki:0},muzaini:{br:0,ki:0},mulla:{br:0,ki:0},ansari:{br:0,ki:0}};
  for(const b of branches)if(c[b.co])c[b.co][b.type==='kiosk'?'ki':'br']++;
  document.getElementById('s-total').textContent=branches.length;
  document.getElementById('s-rows').innerHTML=
    Object.entries(c).filter(([,v])=>v.br+v.ki>0).map(([co,v])=>
      `<div class="sr"><span class="sl"><span style="color:${COLORS[co]}">●</span> ${LABELS[co]}</span>`+
      `<span class="sv">${v.br}${v.ki?`<span style="color:#6b7280;font-size:9px"> +${v.ki}k</span>`:''}</span></div>`
    ).join('');
  ['bec','muzaini','mulla','ansari'].forEach(co=>{
    document.getElementById('cnt-'+co).textContent=`${c[co].br+c[co].ki}`;
  });
}

// ── HOVER ─────────────────────────────────────────────────────
const tip=document.getElementById('htip');
const wrap=document.getElementById('map-wrap');
let hoveredB=null;
function findNearest(mx,my){
  const zoom=map.getZoom();const r=zoom>11?14:zoom>9?11:9;
  let best=null,minD=r;
  for(const b of getActive()){const{x,y}=toXY(b.lat,b.lng);const d=Math.sqrt((mx-x)**2+(my-y)**2);if(d<minD){minD=d;best=b;}}
  return best;
}
heatCanvas.addEventListener('mousemove',e=>{
  const rect=heatCanvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const b=findNearest(mx,my);
  if(b){
    if(b!==hoveredB){
      hoveredB=b;
      const col=COLORS[b.co];
      document.getElementById('ht-bar').style.background=col;
      document.getElementById('ht-co').innerHTML=`<span style="color:${col}">${LABELS[b.co]}</span>`;
      document.getElementById('ht-name').textContent=b.n;
      document.getElementById('ht-tags').innerHTML=
        `<span class="tag type-${b.type}">${b.type==='kiosk'?'◆ Kiosk':'● Branch'}</span>`+
        (b.area?`<span class="tag">${b.area}</span>`:'')+
        (b.gov?`<span class="tag gov">${b.gov}</span>`:'');
    }
    const wRect=wrap.getBoundingClientRect();
    const tx=e.clientX-wRect.left,ty=e.clientY-wRect.top;
    const left=tx>wRect.width/2?tx-224:tx+14;
    const top=ty>wRect.height*.6?ty-140:ty+14;
    tip.style.left=Math.max(4,left)+'px';tip.style.top=Math.max(4,top)+'px';
    tip.style.display='block';heatCanvas.style.cursor='pointer';
  } else {hoveredB=null;tip.style.display='none';heatCanvas.style.cursor='default';}
});
heatCanvas.addEventListener('mouseleave',()=>{hoveredB=null;tip.style.display='none';heatCanvas.style.cursor='default';});

heatCanvas.addEventListener('click',e=>{
  const rect=heatCanvas.getBoundingClientRect();
  const b=findNearest(e.clientX-rect.left,e.clientY-rect.top);
  if(b){
    const col=COLORS[b.co];
    L.popup({maxWidth:240}).setLatLng([b.lat,b.lng]).setContent(`
      <div style="border-left:3px solid ${col};padding-left:10px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:${col};margin-bottom:3px;">${LABELS[b.co]}</div>
        <div style="font-size:14px;font-weight:600;margin-bottom:8px;">${b.n}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;font-size:11px;">
          <span style="background:#1e2130;padding:2px 7px;border-radius:4px;color:#9ca3af;">${b.type==='kiosk'?'◆ Kiosk':'● Branch'}</span>
          ${b.area?`<span style="background:#1e2130;padding:2px 7px;border-radius:4px;color:#9ca3af;">${b.area}</span>`:''}
          ${b.gov?`<span style="background:#1a2e1a;padding:2px 7px;border-radius:4px;color:#86efac;">${b.gov}</span>`:''}
        </div>
      </div>`).openOn(map);
  } else map.closePopup();
});
heatCanvas.addEventListener('mousedown',e=>{
  const rect=heatCanvas.getBoundingClientRect();
  if(!findNearest(e.clientX-rect.left,e.clientY-rect.top)){
    const pane=document.querySelector('.leaflet-map-pane');
    if(pane)pane.dispatchEvent(new MouseEvent('mousedown',{bubbles:true,cancelable:true,clientX:e.clientX,clientY:e.clientY,button:e.button}));
  }
});

// ── BOOT ──────────────────────────────────────────────────────
setBg('govmap'); // start in Map View
loadData();
</script>
